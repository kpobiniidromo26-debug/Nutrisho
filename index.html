<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrisho login.com</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
     <div class="container">

        <div class="login-card">
            <h1 class="logo">Nutrisho</h1>
            <h2>Welcome Back!</h2>
            <p class="subtitle">Level Up Your Fitness</p>

            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="username" placeholder="Username" required>
                </div>

                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required>
                    <span class="forgot">Forgot?</span>
                </div>
                <button type="submit" class="login-btn">Login</button>
                
            </form>

            <div class="divider">OR</div>

            <button class="social google">Login with Google</button>
            <button class="social facebook">Login with Facebook</button>

            <p class="signup-text">
                New to FitQuest?
                <a href="google account.com">Sign Up</a>
            </p>
        </div>
    </div>
  
      <script src="login.js"></script>
</body>
</html>
